name: ZaphScore Test Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --tb=short \
            -x
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "placeholder_key_for_ci"
          FINDINGS_ENCRYPTION_KEY: ""
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""

      - name: Coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Coverage check passed"

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --select=E9,F63,F7,F82 --ignore=F401
