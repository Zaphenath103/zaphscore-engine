name: ZaphLabs War Room Runner

on:
  workflow_dispatch:
    inputs:
      war_room:
        description: 'War room to run (war1/war2/war3/war4)'
        required: true
        default: 'war1'
        type: choice
        options: [war1, war2, war3, war4]
  schedule:
    - cron: '0 17 * * *'  # 8 PM EAT = 17:00 UTC

jobs:
  war-runner:
    name: Run War Room Agent
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZAPHLABS_PAT }}

      - name: Configure git with secret PAT
        run: |
          git config user.email "zaphlabs@zaphenath.app"
          git config user.name "ZaphLabs War Agent"
          git remote set-url origin https://x-access-token:${{ secrets.ZAPHLABS_PAT }}@github.com/${{ github.repository }}.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run war room shift
        run: python scripts/war_runner.py --war ${{ github.event.inputs.war_room || 'war1' }}
        env:
          ZAPHLABS_PAT: ${{ secrets.ZAPHLABS_PAT }}
          ZAPHLABS_SLACK_WEBHOOK: ${{ secrets.ZAPHLABS_SLACK_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
